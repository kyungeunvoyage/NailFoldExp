<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Nail Precision Guide Tool</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; background: #f0f2f5; margin: 0; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); text-align: center; }
        canvas { border: 2px solid #ddd; cursor: crosshair; max-width: 100%; margin-top: 15px; border-radius: 4px; background-color: #eee; }
        .controls { margin-bottom: 15px; display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        button { padding: 12px 20px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-v { background: #e74c3c; color: white; } /* 세로(상하) 측정 */
        .btn-h { background: #3498db; color: white; } /* 가로(좌우) 측정 */
        .btn-reset { background: #95a5a6; color: white; }
        button:hover { opacity: 0.8; transform: translateY(-1px); }
        .status-bar { background: #34495e; color: white; padding: 10px; border-radius: 6px; margin-bottom: 10px; min-width: 450px; font-weight: 500; }
    </style>
</head>
<body>

<div class="container">
    <h2>Nail Grid Analysis Tool</h2>
    
    <div class="status-bar" id="status">먼저 분석할 이미지를 업로드하세요.</div>

    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        <button class="btn-v" onclick="setMode('vertical')">상/하 3선 그리기</button>
        <button class="btn-h" onclick="setMode('horizontal')">좌/우 3선 그리기</button>
        <button class="btn-reset" onclick="resetCanvas()">화면 초기화</button>
    </div>

    <canvas id="canvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const status = document.getElementById('status');
    let img = new Image();
    let mode = 'none';
    let points = [];

    // 가이드 위치 저장을 위한 변수
    let guideLines = {
        topY: null, midY: null, bottomY: null,
        leftX: null, midX: null, rightX: null
    };

    document.getElementById('upload').addEventListener('change', (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                drawScene();
                status.innerText = "분석 모드(버튼)를 선택하고 이미지 위를 클릭하세요.";
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    });

    function setMode(newMode) {
        mode = newMode;
        points = [];
        if(mode === 'vertical') {
            status.innerText = "손톱의 [위쪽 끝]과 [아래쪽 끝]을 차례로 클릭하세요.";
        } else {
            status.innerText = "손톱의 [왼쪽 끝]과 [오른쪽 끝]을 차례로 클릭하세요.";
        }
    }

    canvas.onclick = (e) => {
        if (mode === 'none' || !img.src) return;

        const rect = canvas.getBoundingClientRect();
        const x = (e.clientX - rect.left) * (canvas.width / rect.width);
        const y = (e.clientY - rect.top) * (canvas.height / rect.height);

        points.push({x, y});
        
        // 클릭 지점 표시
        ctx.fillStyle = "white"; // 가시성을 위해 흰색으로 변경
        ctx.shadowBlur = 5;
        ctx.shadowColor = "black";
        ctx.beginPath();
        ctx.arc(x, y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        if (points.length === 2) {
            if (mode === 'vertical') {
                calculateAndDrawVertical();
            } else {
                calculateAndDrawHorizontal();
            }
            points = []; 
            mode = 'none'; 
        }
    };

    // 상/하 측정 및 자극점 생성
    function calculateAndDrawVertical() {
        redrawScene(); // 기존 피드백 점 제거를 위해 배경 다시 그리기

        guideLines.topY = Math.min(points[0].y, points[1].y);
        guideLines.bottomY = Math.max(points[0].y, points[1].y);
        guideLines.midY = (guideLines.topY + guideLines.bottomY) / 2;

        ctx.lineWidth = 4;
        
        // 1. 가이드라인 그리기
        ctx.strokeStyle = "#e74c3c"; // 상/하 경계선 (빨간 점선)
        ctx.setLineDash([15, 10]);
        drawHLine(guideLines.topY);
        drawHLine(guideLines.bottomY);

        ctx.setLineDash([]); // 중앙 가로선 (노란 실선)
        ctx.strokeStyle = "#f1c40f"; 
        drawHLine(guideLines.midY);

        // 2. 자극점(Stimulus Points) 계산 및 그리기
        // 핵심 로직: (상단선 ↔ 중간선)의 반, (중간선 ↔ 하단선)의 반
        const stimY1 = (guideLines.topY + guideLines.midY) / 2;
        const stimY2 = (guideLines.midY + guideLines.bottomY) / 2;
        
        // 점을 그릴 X 좌표 (현재는 클릭한 두 점의 평균 X좌표 값을 사용)
        const avgX = (points[0].x + points[1].x) / 2;

        drawStimulusPoint(avgX, stimY1);
        drawStimulusPoint(avgX, stimY2);

        status.innerText = "상/하 가이드 및 자극점 생성 완료!";
    }

    // 좌/우 측정 (기존 유지)
    function calculateAndDrawHorizontal() {
        redrawScene();

        guideLines.leftX = Math.min(points[0].x, points[1].x);
        guideLines.rightX = Math.max(points[0].x, points[1].x);
        guideLines.midX = (guideLines.leftX + guideLines.rightX) / 2;

        ctx.lineWidth = 4;
        
        ctx.strokeStyle = "#3498db"; // 좌/우 경계선 (파란 점선)
        ctx.setLineDash([15, 10]);
        drawVLine(guideLines.leftX);
        drawVLine(guideLines.rightX);

        ctx.setLineDash([]); // 중앙 세로선 (초록 실선)
        ctx.strokeStyle = "#2ecc71"; 
        drawVLine(guideLines.midX);

        status.innerText = "좌/우 가이드 완료!";
    }

    // 자극점 그리기 함수
    function drawStimulusPoint(x, y) {
        ctx.fillStyle = "red"; // 요구사항: 빨간색 점
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(0,0,0,0.8)";
        ctx.beginPath();
        ctx.arc(x, y, 12, 0, Math.PI * 2); // 눈에 띄게 크기 설정
        ctx.fill();
        
        // 흰색 테두리 추가로 명확하게 표현
        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.shadowBlur = 0;
    }

    function drawHLine(y) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(canvas.width, y); ctx.stroke(); }
    function drawVLine(x) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, canvas.height); ctx.stroke(); }
    
    function drawScene() { ctx.drawImage(img, 0, 0); }
    function redrawScene() { ctx.clearRect(0,0,canvas.width, canvas.height); ctx.drawImage(img, 0, 0); }

    function resetCanvas() {
        if(img.src) {
            redrawScene();
            points = []; mode = 'none';
            guideLines = { topY: null, midY: null, bottomY: null, leftX: null, midX: null, rightX: null };
            status.innerText = "초기화되었습니다. 모드를 선택하세요.";
        }
    }
</script>
</body>
</html>
