<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Force Discrimination Experiment</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f4f8; }
        #container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 600px; }
        .subject-info-box { background: #fff; border: 2px solid #673ab7; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .setup-info { display: flex; justify-content: space-around; margin-bottom: 20px; background: #ede7f6; padding: 15px; border-radius: 10px; font-weight: bold; }
        #admin-display { background: #fff9c4; border: 2px dashed #fbc02d; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px; }
        .pair-box { display: flex; justify-content: center; gap: 20px; font-size: 24px; font-weight: bold; }
        .progress-bar { width: 100%; height: 15px; background: #e8eaed; border-radius: 10px; overflow: hidden; margin-bottom: 20px; position: relative; }
        #progress { width: 0%; height: 100%; background: #673ab7; transition: width 0.1s; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; width: 100%; font-weight: bold; margin-top: 10px; }
        #startBtn { background: #673ab7; color: white; }
        #ansBtn1, #ansBtn2 { background: #3f51b5; color: white; width: 48%; }
        #input-section { display: none; margin-top: 20px; }
        #log-container { margin-top: 25px; text-align: left; font-size: 12px; max-height: 200px; overflow-y: auto; background: #fafafa; padding: 10px; border: 1px solid #eee; }
        select { padding: 8px; border-radius: 5px; border: 1px solid #673ab7; font-weight: bold; }
    </style>
</head>
<body>

<div id="container">
    <h2>Force Discrimination Experiment</h2>
    <button id="popBtn" onclick="openSubjectWindow()" style="background:#9c27b0; color:white; margin-bottom:10px;">1. Subject Window Open</button>
    
    <div class="subject-info-box">
        <div>
            <label>Subject ID:</label>
            <input type="text" id="subjectId" value="S01" style="padding:5px; width:60px; text-align:center;">
        </div>
        <div>
            <label>Condition:</label>
            <select id="expCondition" onchange="setupExp()">
                <option value="In-air">In-air</option>
                <option value="On-touch">On-touch</option>
                <option value="Hard-touch">Hard-touch</option>
            </select>
        </div>
    </div>

    <h3 id="condition-title">Condition: Ready</h3>
    
    <div class="setup-info">
        <div>Ref: <span id="ref-force">-</span></div>
        <div>Comp: <span id="comp-force">-</span></div>
        <div>Trial: <span id="trial-count">0</span> / <span id="total-trial">0</span></div>
    </div>

    <div id="admin-display">
        <div style="font-size:14px; color:#666;">Stimulus Sequence (Admin Only)</div>
        <div class="pair-box">
            <div>1st: <span id="stim1-val" style="color:blue;">?</span></div>
            <div>2nd: <span id="stim2-val" style="color:red;">?</span></div>
        </div>
    </div>
    
    <div class="progress-bar"><div id="progress"></div></div>
    
    <button id="startBtn" onclick="runDiscriminationTrial()">시행 시작 (Start Sequence)</button>

    <div id="input-section">
        <div style="margin-bottom:15px; font-weight:bold;">Which stimulus was STRONGER?</div>
        <div style="display:flex; justify-content:space-between;">
            <button id="ansBtn1" onclick="logResponse(1)">1st was Stronger</button>
            <button id="ansBtn2" onclick="logResponse(2)">2nd was Stronger</button>
        </div>
    </div>

    <div id="log-container"><strong>Session Logs:</strong><div id="logContent"></div></div>
    <button onclick="downloadCSV()" style="background:#5f6368; color:white;">Download CSV</button>
</div>

<script>
    let subjectWindow = null;
    
    // 추천된 75% 정답률 타겟 페어 (VF 강도 기준)
    const pairs = [
        {ref: '0.07g', comp: '0.16g'}, 
        {ref: '0.16g', comp: '0.60g'},
        {ref: '0.60g', comp: '1.40g'},
        {ref: '1.40g', comp: '2.00g'},
        {ref: '0.07g', comp: '0.60g'}, // 대조군
        {ref: '0.60g', comp: '2.00g'}  // 대조군
    ];

    let trialList = [];
    let currentIdx = 0;
    let experimentalData = [];
    let firstStim = ""; 
    let secondStim = "";
    let strongerOne = 1;

    function openSubjectWindow() {
        subjectWindow = window.open("", "SubjectWindow", "width=600,height=400");
        subjectWindow.document.write(`
            <html><body style="background:#333; color:white; display:flex; align-items:center; justify-content:center; height:100vh; font-family:sans-serif;">
                <h1 id="msg" style="font-size:3rem; text-align:center;">Waiting...</h1>
                <script>function updateState(txt, color){ document.body.style.backgroundColor=color; document.getElementById('msg').innerText=txt; }<\/script>
            </body></html>`);
    }

    function setupExp() {
        const cond = document.getElementById('expCondition').value;
        const repetitions = 5; // <--- 한 페어당 반복할 횟수 설정
        
        document.getElementById('condition-title').innerText = "Condition: " + cond;
        
        // 페어를 반복 횟수만큼 복사해서 리스트 생성
        let fullList = [];
        for (let i = 0; i < repetitions; i++) {
            fullList = fullList.concat(JSON.parse(JSON.stringify(pairs)));
        }
        
        // 전체 리스트 셔플
        trialList = fullList.sort(() => Math.random() - 0.5);
        
        document.getElementById('total-trial').innerText = trialList.length;
        currentIdx = 0;
        experimentalData = [];
        document.getElementById('logContent').innerHTML = "";
        document.getElementById('startBtn').disabled = false;
        updateUI();
    }

    function updateUI() {
        if(currentIdx < trialList.length) {
            const t = trialList[currentIdx];
            document.getElementById('ref-force').innerText = t.ref;
            document.getElementById('comp-force').innerText = t.comp;
            document.getElementById('trial-count').innerText = currentIdx + 1;
        } else {
            document.getElementById('condition-title').innerText = "All Finished!";
            document.getElementById('startBtn').disabled = true;
        }
    }

    async function runDiscriminationTrial() {
        if(!subjectWindow) return alert("Open Window First");
        const t = trialList[currentIdx];
        
        const isRefFirst = Math.random() > 0.5;
        firstStim = isRefFirst ? t.ref : t.comp;
        secondStim = isRefFirst ? t.comp : t.ref;
        strongerOne = parseFloat(firstStim) > parseFloat(secondStim) ? 1 : 2;

        document.getElementById('stim1-val').innerText = firstStim;
        document.getElementById('stim2-val').innerText = secondStim;
        document.getElementById('startBtn').disabled = true;

        subjectWindow.updateState("Stimulus 1...", "#2196F3");
        await progress(1000);
        subjectWindow.updateState("Interval...", "#333");
        await progress(1000);
        subjectWindow.updateState("Stimulus 2...", "#F44336");
        await progress(1000);
        
        subjectWindow.updateState("Choose stronger one", "#9C27B0");
        document.getElementById('input-section').style.display = 'block';
    }

    function progress(ms) {
        return new Promise(res => {
            let start = Date.now();
            let timer = setInterval(() => {
                let p = (Date.now() - start) / ms * 100;
                document.getElementById('progress').style.width = p + "%";
                if(p >= 100) { clearInterval(timer); res(); }
            }, 20);
        });
    }

    function logResponse(choice) {
        const cond = document.getElementById('expCondition').value;
        const subId = document.getElementById('subjectId').value;
        const t = trialList[currentIdx];
        const isCorrect = (choice === strongerOne);
        
        experimentalData.push({
            Subject: subId,
            Condition: cond,
            Trial: currentIdx + 1, 
            Ref: t.ref, 
            Comp: t.comp, 
            First: firstStim, 
            Second: secondStim, 
            Choice: choice, 
            Correct: isCorrect
        });

        const log = document.createElement('div');
        log.innerHTML = `[${cond}] Trial ${currentIdx+1}: ${isCorrect ? '✓':'✗'} (Ref:${t.ref}, Comp:${t.comp})`;
        document.getElementById('logContent').prepend(log);

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('startBtn').disabled = false;
        document.getElementById('progress').style.width = "0%";
        currentIdx++;
        updateUI();
    }

    function downloadCSV() {
        const subId = document.getElementById('subjectId').value;
        let csv = "\uFEFFSubject,Condition,Trial,Reference,Comparison,FirstStim,SecondStim,UserChoice,IsCorrect\n";
        experimentalData.forEach(r => {
            csv += `${r.Subject},${r.Condition},${r.Trial},${r.Ref},${r.Comp},${r.First},${r.Second},${r.Choice},${r.Correct}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `Discrimination_${subId}.csv`;
        a.click();
    }
    setupExp();
</script>
</body>
</html>
