<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Force Discrimination - 2AFC JND (In-air & On-touch)</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f0f4f8; }
        #container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 620px; }
        
        .input-group { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; padding: 15px; background: #f8f9fa; border-radius: 10px; border: 1px solid #dee2e6; }
        .input-group div { display: flex; flex-direction: column; align-items: flex-start; }
        .input-group label { font-size: 12px; color: #666; margin-bottom: 4px; font-weight: bold; }
        .input-group input { padding: 8px; border: 1px solid #ccc; border-radius: 5px; width: 100px; text-align: center; font-size: 14px; }

        .setup-info { display: flex; justify-content: space-around; margin-bottom: 20px; background: #ede7f6; padding: 15px; border-radius: 10px; font-weight: bold; }
        #admin-display { background: #fff9c4; border: 2px dashed #fbc02d; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #status-display { background: #e3f2fd; border: 2px solid #2196f3; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; color: #0d47a1; }
        .progress-bar { width: 100%; height: 15px; background: #e8eaed; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #progress { width: 0%; height: 100%; background: #673ab7; transition: width 0.1s; }
        button { padding: 15px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; width: 100%; font-weight: bold; margin-top: 10px; transition: 0.2s; }
        #startBtn { background: #673ab7; color: white; }
        #ansBtn1, #ansBtn2 { background: #3f51b5; color: white; width: 48%; }
        #input-section { display: none; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        #log-container { margin-top: 25px; text-align: left; font-size: 12px; max-height: 150px; overflow-y: auto; background: #fafafa; padding: 10px; border: 1px solid #ddd; }
        .condition-badge { background: #e74c3c; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; }
        button:hover { opacity: 0.9; }
        button:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="container">
    <h2>Force Discrimination</h2>
    <div id="current-condition-display" class="condition-badge">Condition: Ready</div>
    
    <!-- 피험자 및 세션 정보 입력 칸 추가 -->
    <div class="input-group">
        <div>
            <label for="subID">Subject ID</label>
            <input type="text" id="subID" placeholder="e.g. P1" value="P1">
        </div>
        <div>
            <label for="sessNo">Session No</label>
            <input type="text" id="sessNo" placeholder="e.g. S01" value="S01">
        </div>
    </div>

    <p style="margin-top:0px; color:#666;">Reference Intensity: <strong>1.00g</strong></p>
    
    <button onclick="openSubjectWindow()" style="background:#9c27b0; color:white; margin-bottom:10px;">1. Subject Window Open</button>
    
    <div class="setup-info">
        <div>Region: <span id="current-region">-</span></div>
        <div>Trial: <span id="trial-count">0</span> / <span id="total-trials">0</span></div>
    </div>

    <div id="admin-display">
        <div style="font-size:12px; color:#888; padding-top:5px;">Admin Guide (Target: <span id="target-reg" style="color:red; font-weight:bold;">-</span>)</div>
        <div style="font-size:20px; font-weight:bold; padding:10px;">1st: <span id="s1" style="color:blue;">-</span> vs 2nd: <span id="s2" style="color:red;">-</span></div>
    </div>
    
    <div id="status-display">Waiting for Admin to Start</div>
    <div class="progress-bar"><div id="progress"></div></div>
    
    <button id="startBtn" onclick="runTrial()">다음 시행 시작 (Start Sequence)</button>

    <div id="input-section">
        <p style="font-size:1.1rem; font-weight:bold;">Q. Which stimulus was STRONGER?<br><span style="font-size:0.9rem; color:#666;">(Which stimulus was STRONGER?)</span></p>
        <div style="display:flex; justify-content:space-between;">
            <button id="ansBtn1" onclick="logResponse(1)">1st Stimulus</button>
            <button id="ansBtn2" onclick="logResponse(2)">2nd Stimulus</button>
        </div>
    </div>

    <div id="log-container"><strong>Session Logs:</strong><div id="logContent"></div></div>
    <button onclick="downloadCSV()" style="background:#5f6368; color:white; font-size:14px;">Download CSV Data</button>
</div>


<script>
    let subjectWindow = null;
    const regions = ['A', 'B', 'C', 'D'];
    const referenceValue = 1.00;
    const pairs = [
        //{comp: 0.16}, {comp: 0.40}, {comp: 0.60}, {comp: 1.00}, {comp: 1.40}
        {comp: 0.40}, {comp: 0.60}, {comp: 1.00}, {comp: 1.40}, {comp: 2.00}
    ];

    const sessionConditions = ['In-air', 'On-touch'];
    let currentConditionIdx = 0;

    let trialPool = []; // 현재 컨디션의 트라이얼들
    let currentIdx = 0;
    let experimentalData = [];
    let firstStim = 0, secondStim = 0;

    function openSubjectWindow() {
        subjectWindow = window.open("", "SubWin", "width=800,height=500");
        subjectWindow.document.write(`
            <body style="background:#333; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; margin:0;">
                <h1 id="m" style="font-size:3.5rem; text-align:center;">Ready</h1>
                <script>function update(t,c){document.body.style.backgroundColor=c; document.getElementById('m').innerText=t;}<\/script>
            </body>`);
    }

    // 특정 컨디션에 대한 트라이얼 풀 생성
    function createTrialPool(condition) {
        let list = [];
        regions.forEach(reg => {
            pairs.forEach(p => {
                // 각 쌍당 2회 반복
                //list.push({ref: referenceValue, comp: p.comp, region: reg, condition: condition});
                list.push({ref: referenceValue, comp: p.comp, region: reg, condition: condition});
            });
        });
        return list.sort(() => Math.random() - 0.5);
    }

    function setupExp() {
        currentConditionIdx = 0;
        currentIdx = 0;
        trialPool = createTrialPool(sessionConditions[currentConditionIdx]);
        
        // UI 초기화
        document.getElementById('total-trials').innerText = trialPool.length;
        document.getElementById('current-condition-display').innerText = "Condition: " + sessionConditions[currentConditionIdx];
        prepareTrial();
    }

    function prepareTrial() {
        const t = trialPool[currentIdx];
        const isRefFirst = Math.random() > 0.5;
        firstStim = isRefFirst ? t.ref : t.comp;
        secondStim = isRefFirst ? t.comp : t.ref;

        document.getElementById('current-region').innerText = t.region;
        document.getElementById('target-reg').innerText = t.region;
        document.getElementById('s1').innerText = firstStim.toFixed(2) + "g";
        document.getElementById('s2').innerText = secondStim.toFixed(2) + "g";
        document.getElementById('trial-count').innerText = currentIdx + 1;
    }

    async function runTrial() {
        if(!subjectWindow) return alert("피험자 창을 먼저 열어주세요.");
        document.getElementById('startBtn').disabled = true;
        document.getElementById('input-section').style.display = 'none';

        document.getElementById('status-display').innerText = "첫 번째 자극 제시 중...";
        subjectWindow.update("Stimulus 1", "#2196F3");
        await progress(2000); 

        document.getElementById('status-display').innerText = "대기 (Interval)...";
        subjectWindow.update("Ready ... ", "#333");
        await progress(2000);

        document.getElementById('status-display').innerText = "두 번째 자극 제시 중...";
        subjectWindow.update("Stimulus 2", "#F44336");
        await progress(2000);
        
        document.getElementById('status-display').innerText = "피험자 응답 대기 중";
        subjectWindow.update("Which stimulus was STRONGER? 1 or 2", "#9C27B0");
        document.getElementById('input-section').style.display = 'block';
    }

    function progress(ms) {
        return new Promise(res => {
            let start = Date.now();
            let timer = setInterval(() => {
                let p = (Date.now() - start) / ms * 100;
                document.getElementById('progress').style.width = p + "%";
                if(p >= 100) { clearInterval(timer); res(); }
            }, 30);
        });
    }

    function logResponse(choice) {
        const t = trialPool[currentIdx];
        const chosenStim = (choice === 1) ? firstStim : secondStim;
        const choseComparison = (chosenStim === t.comp) ? 1 : 0;

        // 입력된 ID와 세션 번호 가져오기
        const subID = document.getElementById('subID').value;
        const sessNo = document.getElementById('sessNo').value;

        experimentalData.push({
            Subject: subID, 
            Session: sessNo,
            Condition: t.condition,
            Region: t.region, 
            Ref: t.ref, 
            Comp: t.comp,
            First: firstStim, 
            Second: secondStim, 
            Choice: choice, 
            ChoseComp: choseComparison
        });

        const log = document.createElement('div');
        log.innerText = `[${t.condition}-${t.region}] Trial ${currentIdx+1}: 선택(${chosenStim}g)`;
        document.getElementById('logContent').prepend(log);

        document.getElementById('input-section').style.display = 'none';
        document.getElementById('progress').style.width = "0%";
        currentIdx++;
        
        // 현재 컨디션 종료 체크
        if (currentIdx < trialPool.length) {
            document.getElementById('startBtn').disabled = false;
            prepareTrial();
        } else {
            // 다음 컨디션으로 전환 혹은 실험 종료
            moveToNextCondition();
        }
    }

    function moveToNextCondition() {
        currentConditionIdx++;
        if (currentConditionIdx < sessionConditions.length) {
            const nextCond = sessionConditions[currentConditionIdx];

            if(subjectWindow)
            {
                subjectWindow.update("Ready for Next Session", "#333");
            }
            alert(`'${sessionConditions[currentConditionIdx-1]}' 조건이 끝났습니다.\n다음 조건인 '${nextCond}'을 시작합니다.`);
            
            currentIdx = 0;
            trialPool = createTrialPool(nextCond);
            
            // UI 업데이트
            document.getElementById('total-trials').innerText = trialPool.length;
            document.getElementById('current-condition-display').innerText = "Condition: " + nextCond;
            document.getElementById('startBtn').disabled = false;
            prepareTrial();
        } else {
            document.getElementById('status-display').innerText = "모든 실험 종료";
            document.getElementById('current-condition-display').innerText = "Status: All Finished";
            subjectWindow.update("모든 실험이 완료되었습니다.", "#2E7D32");
        }
    }

    function downloadCSV() {
        // 파일명 생성을 위한 ID 및 세션 정보 추출
        const subID = document.getElementById('subID').value || "Unknown";
        const sessNo = document.getElementById('sessNo').value || "Unknown";
        
        let csv = "\uFEFFSubject,Session,Condition,Region,Reference,Comparison,FirstStim,SecondStim,UserChoice,ChoseComparison\n";
        experimentalData.forEach(r => {
            csv += `${r.Subject},${r.Session},${r.Condition},${r.Region},${r.Ref},${r.Comp},${r.First},${r.Second},${r.Choice},${r.ChoseComp}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        // 파일명 반영: 2AFC_Force_JND_P1_S01.csv 형태
        a.download = `2AFC_Force_JND_${subID}_${sessNo}.csv`;
        a.click();
    }

    setupExp();
</script>
</body>
</html>
