<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Spatial Discrimination - Point Comparison</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f4f7f6; }
        #container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 720px; }
        .subject-info-box { background: #fff; border: 2px solid #2e7d32; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .subject-info-box label { font-weight: bold; font-size: 14px; }
        .setup-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #e1f5fe; padding: 15px; border-radius: 10px; font-weight: bold; }
        #admin-display { background: #fff3e0; border: 2px dashed #ff9800; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #status-display { background: #e3f2fd; border: 2px solid #2196f3; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; color: #0d47a1; }
        .progress-bar { width: 100%; height: 15px; background: #e8eaed; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #progress { width: 0%; height: 100%; background: #0288d1; transition: width 0.1s; }
        button { padding: 12px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; width: 100%; font-weight: bold; margin-top: 10px; }
        #startBtn { background: #0288d1; color: white; }
        #ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; display: none; }
        .ans-btn { background: #1976d2; color: white; font-size: 1.2rem; }
        .question-text { grid-column: span 2; font-weight: bold; margin-bottom: 10px; color: #d32f2f; font-size: 1.2rem; line-height: 1.4; }
        #log-container { margin-top: 25px; text-align: left; font-size: 12px; max-height: 150px; overflow-y: auto; background: #fafafa; padding: 10px; border: 1px solid #eee; }
        .condition-badge { background: #d32f2f; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        .highlight-seq { font-weight: bold; color: #d32f2f; background-color: #ffff00; padding: 4px 12px; border-radius: 4px; font-size: 1.4rem; border: 2px solid #ffd600; }
        .dist-input { padding: 5px; width: 60px; text-align: center; }
    </style>
</head>
<body>

<div id="container">
    <h2>Spatial Discrimination (Reference: g0)</h2>
    <div id="cond-badge" class="condition-badge" style="display:none;">Ready</div>
    <br>
    <button onclick="openSubjectWindow()" style="background:#43a047; color:white; width:auto; margin-bottom:15px;">1. Open Subject Window</button>
    
    <div class="subject-info-box">
        <label>Subject ID:</label>
        <input type="text" id="subjectId" value="P1" style="padding:5px; width:60px; text-align:center;">
        <label style="margin-left:10px;">cd Dist (mm):</label>
        <input type="text" id="dist_cd" class="dist-input" value="0">
    </div>

    <button onclick="initiateFullExperiment()" style="background:#283593; color:white;">전체 실험 시작 (Start Full Experiment)</button>

    <div class="setup-info">
        <div>Trial Progress: <span id="trial-count">0</span> / <span id="total-trials">0</span></div>
        <div>Current Force: <span id="current-cond-label" style="color:#0288d1;">None</span></div>
    </div>

    <div id="admin-display">
        <div style="font-size: 14px; color: #666; margin-bottom: 10px;">[Admin Monitor] Next Trial Preview</div>
        <div style="display: flex; justify-content: center; gap: 20px; align-items: center;">
            <div style="font-size: 1.1rem;">
                Sequence: <span id="admin-seq" class="highlight-seq">?</span>
            </div>
        </div>
    </div>
    
    <div id="status-display">Waiting for Admin to Start</div>
    <div class="progress-bar"><div id="progress"></div></div>
    
    <button id="startBtn" onclick="runRandomTrial()" disabled>Click Start Experiment Button First</button>

    <div id="ans-grid">
        <div id="dynamic-question" class="question-text">The second stimulus was to the _________ of the first stimulus?</div>
        <button class="ans-btn" onclick="logResponse('Left')">Left</button>
        <button class="ans-btn" onclick="logResponse('Right')">Right</button>
    </div>

    <div id="log-container"><strong>Logs:</strong><div id="logContent"></div></div>
    <button onclick="downloadCSV()" style="background:#455a64; color:white;">Download Results CSV</button>
</div>

<script>
    let subjectWindow = null;
    let trialPool = [];
    let experimentalData = []; 
    let currentIdx = 0;
    let currentForce = "";
    let forceOrder = []; 
    let currentForceIdx = 0;

    const imgSrc = "/Users/kyungeunjung/NailFoldExp/ETC/LR.png"; 
    const imgSrc2 = "/Users/kyungeunjung/NailFoldExp/ETC/NS.png"; 
    const imgSrc3 = "/Users/kyungeunjung/NailFoldExp/ETC/guide_img2.png"; 

    // g-3 ~ g3 지점 정의 (g0는 기준점)
    const points = ['g-3', 'g-2', 'g-1', 'g0', 'g1', 'g2', 'g3'];

    function openSubjectWindow() {
        subjectWindow = window.open("", "SubjectWindow", "width=800,height=900");
        subjectWindow.document.write(`
            <html><body style="background:#222; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; margin:0;">
                <div style="text-align:center; display:flex; flex-direction:column; align-items:center; justify-content:center;">
                    <h1 id="msg" style="font-size:3rem; margin-bottom:20px;">Ready</h1>
                    <div id="indicator" style="width:60px; height:60px; border-radius:50%; margin-bottom:30px; background:transparent;"></div>
                    <img id="guide-img" src="${imgSrc}" style="width:400px; height:auto; opacity:0.8; border:2px solid #444; border-radius:10px; display:none;">
                </div>
                <script>
                    function updateState(txt, color, indColor, showImgVisible){ 
                        document.getElementById('msg').innerText = txt; 
                        document.body.style.backgroundColor = color; 
                        document.getElementById('indicator').style.backgroundColor = indColor || 'transparent';
                        document.getElementById('guide-img').style.display = showImgVisible ? 'block' : 'none';
                    }
                <\/script>
            </body></html>`);
    }

    function initiateFullExperiment() {
        experimentalData = [];
        currentForceIdx = 0;
        forceOrder = Math.random() > 0.5 ? ['1.0g', '26.0g'] : ['26.0g', '1.0g'];
        startSession(forceOrder[currentForceIdx]);
    }

    function startSession(force) {
        currentForce = force;
        document.getElementById('cond-badge').style.display = 'inline-block';
        document.getElementById('cond-badge').innerText = "Force: " + force;
        document.getElementById('current-cond-label').innerText = force;
        generateTrialList();
        alert(`새로운 세션 시작: ${force}`);
    }

    function generateTrialList() {
        trialPool = [];
        const repetitions = 4; // 각 포인트당 g0와의 조합 반복 횟수
        const comparisons = ['g-4','g-3', 'g-2', 'g-1', 'g1', 'g2', 'g3', 'g4'];

        comparisons.forEach(p => {
            for(let r=0; r<repetitions; r++) {
                // g0가 첫 번째일지 두 번째일지 랜덤 결정
                let isG0First = Math.random() > 0.5;
                let p1 = isG0First ? 'g0' : p;
                let p2 = isG0First ? p : 'g0';
                
                // 실제 정답 계산 (비교군 p가 g0 기준 왼쪽인지 오른쪽인지)
                // 질문: "The second stimulus was to the ____ of the first stimulus?"
                let correctLabel = "";
                if (isG0First) {
                    // g0 -> p 인 경우, p의 위치가 정답
                    correctLabel = p.includes('-') ? "Left" : "Right";
                } else {
                    // p -> g0 인 경우, g0의 위치가 정답 (p가 g-3이면 g0는 Right)
                    correctLabel = p.includes('-') ? "Right" : "Left";
                }

                trialPool.push({
                    p1: p1,
                    p2: p2,
                    comparison_point: p,
                    correct_answer: correctLabel
                });
            }
        });

        // 셔플
        for (let i = trialPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [trialPool[i], trialPool[j]] = [trialPool[j], trialPool[i]];
        }

        currentIdx = 0;
        document.getElementById('total-trials').innerText = trialPool.length;
        document.getElementById('trial-count').innerText = "0";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').innerText = "실험 시작 (Start)";
        updateAdminPreview();
    }

    function updateAdminPreview() {
        if (currentIdx < trialPool.length) {
            const nextTrial = trialPool[currentIdx];
            document.getElementById('admin-seq').innerText = `${nextTrial.p1} → ${nextTrial.p2}`;
        }
    }

    async function runRandomTrial() {
        if(!subjectWindow) return alert("Open Subject Window First");
        const currentTrial = trialPool[currentIdx];

        document.getElementById('startBtn').disabled = true;
        document.getElementById('ans-grid').style.display = 'none';

        document.getElementById('status-display').innerText = "자극 제시 중...";
        // 자극 제시 단계: 가이드 이미지 숨김 (false)
        subjectWindow.updateState("Concentrate..", "#1b5e20", "#4caf50", false);
        await progress(5000);

        document.getElementById('status-display').innerText = "피험자 응답 대기 중";
        // 질문 단계: 가이드 이미지 표시 (true)
        subjectWindow.updateState("The second stimulus was to the _________ of the first stimulus?", "#1565c0", "transparent", true);
        
        window.activeTrialData = currentTrial;
        document.getElementById('ans-grid').style.display = 'grid';
    }

    function progress(ms) {
        return new Promise(res => {
            let start = Date.now();
            let timer = setInterval(() => {
                let p = (Date.now() - start) / ms * 100;
                document.getElementById('progress').style.width = Math.min(p, 100) + "%";
                if(p >= 100) { 
                    clearInterval(timer); 
                    setTimeout(() => {
                        document.getElementById('progress').style.width = "0%";
                        res();
                    }, 50);
                }
            }, 30);
        });
    }

    function logResponse(userChoice) {
        const info = window.activeTrialData;
        const subId = document.getElementById('subjectId').value;
        const distValue = document.getElementById('dist_cd').value;
        const isCorrect = (userChoice === info.correct_answer);

        experimentalData.push({
            Subject: subId, 
            Force: currentForce, 
            Trial_Total: experimentalData.length + 1,
            CD_Distance: distValue, 
            Stim_1st: info.p1, 
            Stim_2nd: info.p2,
            Comparison_Target: info.comparison_point,
            User_Response: userChoice, 
            Target_Response: info.correct_answer, 
            IsCorrect: isCorrect ? 1 : 0
        });

        const log = document.createElement('div');
        log.style.color = isCorrect ? "#2e7d32" : "#d32f2f";
        log.innerHTML = `[${currentForce}] T${currentIdx+1}: ${info.p1}→${info.p2} | User: ${userChoice} (${isCorrect ? '✓':'✗'})`;
        document.getElementById('logContent').prepend(log);

        currentIdx++;
        document.getElementById('trial-count').innerText = currentIdx;
        document.getElementById('ans-grid').style.display = 'none';
        document.getElementById('status-display').innerText = "Waiting for Next Trial";
        
        // Ready 단계: 가이드 이미지 숨김 (false)
        subjectWindow.updateState("Ready", "#222", "transparent", false);

        if(currentIdx < trialPool.length) {
            document.getElementById('startBtn').disabled = false;
            updateAdminPreview();
        } else {
            handleNextSession();
        }
    }

    function handleNextSession() {
        currentForceIdx++;
        if (currentForceIdx < forceOrder.length) {
            alert(`세션 종료. 다음 세션(${forceOrder[currentForceIdx]}) 시작.`);
            startSession(forceOrder[currentForceIdx]);
        } else {
            alert("전체 종료.");
            document.getElementById('startBtn').innerText = "All Finished";
            subjectWindow.updateState("Experiment Completed", "#222", "transparent", false);
        }
    }

    function downloadCSV() {
        if (experimentalData.length === 0) return alert("데이터 없음");
        const subId = document.getElementById('subjectId').value || "Unknown";
        let csv = "\uFEFFSubject,Force,Trial_Total,CD_Distance,Stim_1st,Stim_2nd,Comparison_Target,User_Response,Target_Response,IsCorrect\n";
        experimentalData.forEach(r => {
            csv += `${r.Subject},${r.Force},${r.Trial_Total},${r.CD_Distance},${r.Stim_1st},${r.Stim_2nd},${r.Comparison_Target},${r.User_Response},${r.Target_Response},${r.IsCorrect}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${subId}_SpatialDiscrimination.csv`;
        a.click();
    }
</script>
</body>
</html>
