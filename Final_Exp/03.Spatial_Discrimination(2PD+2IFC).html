<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Spatial Discrimination</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background-color: #f4f7f6; }
        #container { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; width: 720px; }
        .subject-info-box { background: #fff; border: 2px solid #2e7d32; padding: 15px; border-radius: 10px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .subject-info-box label { font-weight: bold; font-size: 14px; }
        .setup-info { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; background: #e1f5fe; padding: 15px; border-radius: 10px; font-weight: bold; }
        #admin-display { background: #fff3e0; border: 2px dashed #ff9800; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        #status-display { background: #e3f2fd; border: 2px solid #2196f3; padding: 10px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; color: #0d47a1; }
        .progress-bar { width: 100%; height: 15px; background: #e8eaed; border-radius: 10px; overflow: hidden; margin-bottom: 20px; }
        #progress { width: 0%; height: 100%; background: #0288d1; transition: width 0.1s; }
        button { padding: 12px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; transition: 0.2s; width: 100%; font-weight: bold; margin-top: 10px; }
        #startBtn { background: #0288d1; color: white; }
        #ans-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; display: none; }
        .ans-btn { background: #1976d2; color: white; font-size: 1.2rem; }
        .question-text { grid-column: span 2; font-weight: bold; margin-bottom: 10px; color: #d32f2f; font-size: 1.4rem; }
        #log-container { margin-top: 25px; text-align: left; font-size: 12px; max-height: 150px; overflow-y: auto; background: #fafafa; padding: 10px; border: 1px solid #eee; }
        .session-btn-container { display: flex; gap: 10px; margin-bottom: 20px; }
        .preview-box { font-size: 1.2rem; color: #e65100; font-weight: 800; background: #ffe0b2; padding: 5px 10px; border-radius: 5px; }
        .condition-badge { background: #d32f2f; color: white; padding: 5px 15px; border-radius: 20px; font-size: 0.9rem; margin-bottom: 10px; display: inline-block; font-weight: bold; }
        
        .highlight-seq { 
            font-weight: bold; 
            color: #d32f2f; 
            background-color: #ffff00; 
            padding: 4px 12px; 
            border-radius: 4px;
            font-size: 1.4rem;
            border: 2px solid #ffd600;
        }
    </style>
</head>
<body>

<div id="container">
    <h2>Spatial Discrimination</h2>
    <div id="cond-badge" class="condition-badge" style="display:none;">Condition: Ready</div>
    <br>
    <button onclick="openSubjectWindow()" style="background:#43a047; color:white; width:auto; margin-bottom:15px;">1. Open Subject Window</button>
    
    <div class="subject-info-box">
        <label>Subject ID:</label>
        <input type="text" id="subjectId" value="P1" style="padding:5px; width:60px; text-align:center;">
        <label style="margin-left:10px;">Session No:</label>
        <input type="text" id="sessionNo" value="S01" style="padding:5px; width:60px; text-align:center;">
    </div>

    <div class="session-btn-container">
        <button onclick="startFullExperiment()" style="background:#283593; color:white;">전체 실험 시작 (Start Full Experiment)</button>
    </div>

    <div class="setup-info">
        <div>Trial Progress: <span id="trial-count">0</span> / <span id="total-trials">0</span></div>
        <div>Current Condition: <span id="current-cond-label" style="color:#0288d1;">None</span></div>
    </div>

    <div id="admin-display">
        <div style="font-size: 14px; color: #666; margin-bottom: 10px;">[Admin Monitor] Next Trial Preview</div>
        <div style="display: flex; justify-content: center; gap: 20px; align-items: center;">
            <span id="pair-display" style="display: none;">-</span>
            <div style="font-size: 1.1rem;">
                Sequence: <span id="admin-seq" class="highlight-seq">?</span>
            </div>
        </div>
        <div style="font-size: 13px; margin-top: 10px; color: #555;">
            Distance: <span id="admin-dist" style="font-weight:bold;">0</span>mm | 
            Axis: <span id="admin-axis" style="font-weight:bold;">-</span>
        </div>
    </div>
    
    <div id="status-display">Waiting for Admin to Start</div>
    <div class="progress-bar"><div id="progress"></div></div>
    
    <button id="startBtn" onclick="runRandomTrial()" disabled>Select Start Button First</button>

    <div id="ans-grid">
        <div id="dynamic-question" class="question-text">Question?</div>
        <button class="ans-btn" onclick="logResponse('1st')">1st (First)</button>
        <button class="ans-btn" onclick="logResponse('2nd')">2nd (Second)</button>
    </div>

    <div id="log-container"><strong>Logs:</strong><div id="logContent"></div></div>
    <button onclick="downloadCSV()" style="background:#455a64; color:white;">Download CSV Result</button>
</div>

<script>
    let subjectWindow = null;
    let trialPool = [];
    let experimentalData = [];
    let currentIdx = 0;
    
    const sessionConditions = ['In-air', 'On-touch'];
    let currentConditionIdx = 0;

    // 이미지 경로 설정
    const imgSrc = "/Users/kyungeunjung/NailFoldExp/LR.png"; 
    const imgSrc2 = "/Users/kyungeunjung/NailFoldExp/UD.png"; 
    const imgSrc3 = "/Users/kyungeunjung/NailFoldExp/guide_img2.png"; // Ready 이미지 추가

    const distanceMap = [
        { p1: 'd', p2: 'e', dist: 5.0, axis: 'LR', q: "Which one was more Left? 1 or 2", correct_val: "Left", incorrect_val: "Right" },
        { p1: 'c', p2: 'f', dist: 8.0, axis: 'LR', q: "Which one was more Left? 1 or 2", correct_val: "Left", incorrect_val: "Right" },
        { p1: 'b', p2: 'g', dist: 12.0, axis: 'LR', q: "Which one was more Left? 1 or 2", correct_val: "Left", incorrect_val: "Right" },
        { p1: 'a', p2: 'h', dist: 12.0, axis: 'LR', q: "Which one was more Left? 1 or 2", correct_val: "Left", incorrect_val: "Right" },
        { p1: 'a', p2: 'b', dist: 5.0, axis: 'UD', q: "Which one was more Distal? 1 or 2", correct_val: "Distal", incorrect_val: "Proximal" },
        { p1: 'a', p2: 'c', dist: 8.0, axis: 'UD', q: "Which one was more Distal? 1 or 2", correct_val: "Distal", incorrect_val: "Proximal" },
        { p1: 'a', p2: 'd', dist: 10.0, axis: 'UD', q: "Which one was more Distal? 1 or 2", correct_val: "Distal", incorrect_val: "Proximal" },
        { p1: 'b', p2: 'c', dist: 2.7, axis: 'UD', q: "Which one was more Distal? 1 or 2", correct_val: "Distal", incorrect_val: "Proximal" },
        { p1: 'b', p2: 'd', dist: 5.5, axis: 'UD', q: "Which one was more Distal? 1 or 2", correct_val: "Distal", incorrect_val: "Proximal" },
        { p1: 'c', p2: 'd', dist: 2.0, axis: 'UD', q: "Which one was more Distal? 1 or 2", correct_val: "Distal", incorrect_val: "Proximal" }
    ];

    function openSubjectWindow() {
        subjectWindow = window.open("", "SubjectWindow", "width=800,height=900");
        subjectWindow.document.write(`
            <html><body style="background:#222; color:white; display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; font-family:sans-serif; overflow:hidden; margin:0;">
                <div style="text-align:center;">
                    <h1 id="msg" style="font-size:3rem; margin-bottom:20px;">Ready</h1>
                    <div id="indicator" style="width:60px; height:60px; border-radius:50%; margin:0 auto 30px auto; background:transparent;"></div>
                    <img id="guide-img" src="${imgSrc}" style="width:400px; height:auto; opacity:0.8; border:2px solid #444; border-radius:10px; display:none;">
                    <img id="guide-img2" src="${imgSrc2}" style="width:400px; height:auto; opacity:0.8; border:2px solid #444; border-radius:10px; display:none;">
                    <img id="guide-img3" src="${imgSrc3}" style="width:400px; height:auto; opacity:0.8; border:2px solid #444; border-radius:10px; display:block;">
                </div>
                <script>
                    function updateState(txt, color, indColor, showImg, showImg2, showImg3){ 
                        document.getElementById('msg').innerText = txt; 
                        document.body.style.backgroundColor = color; 
                        document.getElementById('indicator').style.backgroundColor = indColor || 'transparent';
                        document.getElementById('guide-img').style.display = showImg ? 'block' : 'none';
                        document.getElementById('guide-img2').style.display = showImg2 ? 'block' : 'none';
                        document.getElementById('guide-img3').style.display = showImg3 ? 'block' : 'none';
                    }
                <\/script>
            </body></html>`);
    }

    function startFullExperiment() {
        currentConditionIdx = 0;
        experimentalData = [];
        document.getElementById('cond-badge').style.display = 'inline-block';
        initiateCondition();
    }

    function initiateCondition() {
        const cond = sessionConditions[currentConditionIdx];
        document.getElementById('cond-badge').innerText = "Condition: " + cond;
        document.getElementById('current-cond-label').innerText = cond;
        generateTrialList(cond);
    }

    function generateTrialList(condition) {
        trialPool = [];
        let lrPool = [];
        distanceMap.filter(item => item.axis === 'LR').forEach(item => {
            lrPool.push({ ...item, condition: condition, isP1First: true });
            lrPool.push({ ...item, condition: condition, isP1First: false });
        });
        for (let i = lrPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [lrPool[i], lrPool[j]] = [lrPool[j], lrPool[i]];
        }
        let udPool = [];
        distanceMap.filter(item => item.axis === 'UD').forEach(item => {
            udPool.push({ ...item, condition: condition, isP1First: true });
            udPool.push({ ...item, condition: condition, isP1First: false });
        });
        for (let i = udPool.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [udPool[i], udPool[j]] = [udPool[j], udPool[i]];
        }
        trialPool = [...lrPool, ...udPool];
        currentIdx = 0;
        document.getElementById('total-trials').innerText = trialPool.length;
        document.getElementById('trial-count').innerText = "0";
        document.getElementById('startBtn').disabled = false;
        document.getElementById('startBtn').innerText = "실험 시작 (Start)";
        updateAdminPreview();
    }

    function updateAdminPreview() {
        if (currentIdx < trialPool.length) {
            const nextTrial = trialPool[currentIdx];
            const firstPin = nextTrial.isP1First ? nextTrial.p1 : nextTrial.p2;
            const secondPin = nextTrial.isP1First ? nextTrial.p2 : nextTrial.p1;
            const seqElem = document.getElementById('admin-seq');
            if(seqElem) seqElem.innerText = `${firstPin.toUpperCase()} → ${secondPin.toUpperCase()}`;
            document.getElementById('admin-dist').innerText = nextTrial.dist;
            document.getElementById('admin-axis').innerText = nextTrial.axis; 
            document.getElementById('dynamic-question').innerText = nextTrial.q;
        }
    }

    async function runRandomTrial() {
        if(!subjectWindow) return alert("Open Subject Window First");
        const currentTrial = trialPool[currentIdx];
        const isP1First = currentTrial.isP1First;

        document.getElementById('startBtn').disabled = true;
        document.getElementById('ans-grid').style.display = 'none';

        // --- 축 전환 안내 로직 ---
        const isFirstLR = (currentTrial.axis === 'LR' && currentIdx === 0);
        const lrCount = trialPool.filter(t => t.axis === 'LR').length;
        const isFirstUD = (currentTrial.axis === 'UD' && currentIdx === lrCount);

        if (isFirstLR || isFirstUD) {
            let sessionMsg = currentTrial.axis === 'LR' ? "(Left / Right) Task" : "(Distal / Proximal) Task";
            document.getElementById('status-display').innerText = "새로운 세션 준비 중...";
            // 전환 안내 시에는 모든 이미지를 숨깁니다.
            subjectWindow.updateState(sessionMsg, "#fbc02d", "transparent", false, false, false);
            await new Promise(res => setTimeout(res, 2000)); 
        }

        let axisInfo = currentTrial.axis === 'LR' ? "" : "";
        let displayMsg = `Concentrate..\n[${axisInfo}]`;
        let isLR = (currentTrial.axis === 'LR');
        let isUD = (currentTrial.axis === 'UD');

        document.getElementById('status-display').innerText = "자극 제시 중: " + axisInfo;
        // 자극 중: 해당 축 이미지 노출 (Ready 이미지는 끔)
        subjectWindow.updateState(displayMsg, "#1b5e20", "#4caf50", isLR, isUD, false);
        await progress(8000);

        document.getElementById('status-display').innerText = "피험자 응답 대기 중";
        // 질문 중: 해당 축 이미지 노출 (Ready 이미지는 끔)
        subjectWindow.updateState(currentTrial.q, "#1565c0", "transparent", isLR, isUD, false);
        
        window.activeTrialData = { 
            condition: currentTrial.condition,
            dist: currentTrial.dist, axis: currentTrial.axis, 
            p1: currentTrial.p1, p2: currentTrial.p2, isP1First: isP1First,
            correct: isP1First ? "1st" : "2nd",
            correct_label: currentTrial.correct_val, incorrect_label: currentTrial.incorrect_val
        };
        document.getElementById('ans-grid').style.display = 'grid';
    }

    function progress(ms) {
        return new Promise(res => {
            let start = Date.now();
            let timer = setInterval(() => {
                let p = (Date.now() - start) / ms * 100;
                document.getElementById('progress').style.width = Math.min(p, 100) + "%";
                if(p >= 100) { 
                    clearInterval(timer); 
                    setTimeout(() => {
                        document.getElementById('progress').style.width = "0%";
                        res();
                    }, 50);
                }
            }, 30);
        });
    }

    function logResponse(choice) {
        const info = window.activeTrialData;
        const isCorrect = (choice === info.correct);
        const subId = document.getElementById('subjectId').value;
        const sessNo = document.getElementById('sessionNo').value;
        const firstStim = info.isP1First ? info.p1 : info.p2;
        const secondStim = info.isP1First ? info.p2 : info.p1;
        const userLabelChoice = (choice === info.correct) ? info.correct_label : info.incorrect_label;

        experimentalData.push({
            Subject: subId, Session: sessNo, Condition: info.condition, Trial: currentIdx + 1,
            Pair: `${info.p1}-${info.p2}`, Stim_1st: firstStim, Stim_2nd: secondStim,
            Target_Order: info.correct, Target_Label: info.correct_label,
            User_Order: choice, User_Label: userLabelChoice, 
            Distance: info.dist, Axis: info.axis, IsCorrect: isCorrect ? 1 : 0
        });

        const log = document.createElement('div');
        log.style.color = isCorrect ? "#2e7d32" : "#d32f2f";
        log.innerHTML = `[${info.condition}] T${currentIdx+1} [${firstStim.toUpperCase()}→${secondStim.toUpperCase()}]: ${isCorrect ? '✓':'✗'}`;
        document.getElementById('logContent').prepend(log);

        currentIdx++;
        document.getElementById('trial-count').innerText = currentIdx;
        document.getElementById('ans-grid').style.display = 'none';
        document.getElementById('status-display').innerText = "Waiting for Next Trial";
        
        // 응답 완료 후 다음 버튼 누르기 전 대기 상태: Ready 이미지 표시
        subjectWindow.updateState("Ready", "#222", "transparent", false, false, true);

        if(currentIdx < trialPool.length) {
            document.getElementById('startBtn').disabled = false;
            updateAdminPreview();
        } else {
            moveToNextCondition();
        }
    }

    function moveToNextCondition() {
        currentConditionIdx++;
        if (currentConditionIdx < sessionConditions.length) {
            const nextCond = sessionConditions[currentConditionIdx];
            alert(`'${sessionConditions[currentConditionIdx-1]}' 조건 완료. 다음 '${nextCond}' 시작.`);
            initiateCondition();
        } else {
            alert("모든 실험 조건 종료.");
            document.getElementById('startBtn').innerText = "All Finished";
            document.getElementById('startBtn').disabled = true;
            subjectWindow.updateState("Experiment Completed", "#222", "transparent", false, false, false);
        }
    }

    function downloadCSV() {
        const subId = document.getElementById('subjectId').value || "Unknown";
        const sessNo = document.getElementById('sessionNo').value || "Unknown";
        let csv = "\uFEFFSubject,Session,Condition,Trial,Pair,Stim_1st,Stim_2nd,Target_Order,Target_Label,User_Order,User_Label,Distance,Axis,IsCorrect\n";
        experimentalData.forEach(r => {
            csv += `${r.Subject},${r.Session},${r.Condition},${r.Trial},${r.Pair},${r.Stim_1st},${r.Stim_2nd},${r.Target_Order},${r.Target_Label},${r.User_Order},${r.User_Label},${r.Distance},${r.Axis},${r.IsCorrect}\n`;
        });
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = `${subId}_${sessNo}_Spatial_Discrimination.csv`;
        a.click();
    }
</script>
</body>
</html>
